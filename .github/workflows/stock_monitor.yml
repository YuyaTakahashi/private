name: Stock Monitor

on:
  schedule:
    # 米国市場クローズ後（22:00 UTC = 翌朝7:00 JST）月〜金
    - cron: "0 22 * * 1-5"
  workflow_dispatch:  # 手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run monitor
        env:
          GMAIL_FROM:        ${{ secrets.GMAIL_FROM }}
          GMAIL_TO:          ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python stock_monitor/monitor.py

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_monitor/state.json
          git diff --staged --quiet || git commit -m "chore: update stock state [skip ci]"
          git push
