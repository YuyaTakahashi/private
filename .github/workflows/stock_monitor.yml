name: Stock Monitor

on:
  schedule:
    # 夏時間 (EDT): 20:30 UTC = 5:30 AM JST（市場クローズ30分後）
    - cron: "30 20 * * 1-5"
    # 冬時間 (EST): 21:30 UTC = 6:30 AM JST（市場クローズ30分後）
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      test_line:
        description: "LINEテスト送信（サンプル状態変化を送信）"
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run monitor
        env:
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          LINE_TOKEN:         ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
          TEST_LINE:          ${{ inputs.test_line }}
        run: python stock_monitor/monitor.py

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_monitor/state.json
          git diff --staged --quiet || git commit -m "chore: update stock state [skip ci]"
          git push
